<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniVerge - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/chat.css">
</head>
<body class="min-h-screen flex flex-col bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800 transition-colors duration-300">

    <!-- Navbar -->
    <nav class="bg-white/95 dark:bg-gray-900/95 backdrop-blur-md shadow-lg sticky top-0 z-50 border-b border-gray-200 dark:border-gray-700">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 max-w-7xl">
            <div class="flex justify-between items-center h-16 md:h-20">
                <div class="flex items-center space-x-3 cursor-pointer group" onclick="showPage('landing', false)">
                    <div class="relative">
                        <i class="fas fa-graduation-cap text-3xl md:text-4xl text-indigo-600 dark:text-indigo-400 group-hover:scale-110 transition-transform duration-300"></i>
                        <div class="absolute -top-1 -right-1 w-3 h-3 bg-pink-500 rounded-full animate-pulse"></div>
                    </div>
                    <div>
                        <span class="text-2xl md:text-3xl font-extrabold bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 bg-clip-text text-transparent">UniVerge</span>
                        <p class="text-xs text-gray-500 dark:text-gray-400 hidden md:block">Your Future, Unlocked</p>
                    </div>
                </div>

                <div class="hidden md:flex items-center space-x-1 lg:space-x-2">
                    <button id="nav-home" onclick="showPage('landing', false)" class="nav-link px-3 lg:px-4 py-2 rounded-lg text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all duration-200 flex items-center gap-2 font-medium hidden">
                        <i class="fas fa-home text-sm"></i> Home
                    </button>
                    <button id="nav-dashboard" onclick="showPage('dashboard')" class="nav-link px-3 lg:px-4 py-2 rounded-lg text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all duration-200 flex items-center gap-2 font-medium hidden">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </button>
                    <button id="nav-profile" onclick="showPage('profile')" class="nav-link px-3 lg:px-4 py-2 rounded-lg text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all duration-200 flex items-center gap-2 font-medium hidden">
                        <i class="fas fa-user-circle"></i> Profile
                    </button>
                    <button id="nav-storyboard" onclick="showPage('storyboard')" class="nav-link px-3 lg:px-4 py-2 rounded-lg text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all duration-200 flex items-center gap-2 font-medium hidden">
                        <i class="fas fa-book-open"></i> Stories
                    </button>
                    <button id="nav-job-board" onclick="showPage('job-board')" class="nav-link px-3 lg:px-4 py-2 rounded-lg text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all duration-200 flex items-center gap-2 font-medium hidden">
                        <i class="fas fa-briefcase"></i> Job Board
                    </button>
                    <button id="nav-quick-connect" onclick="showPage('quick-connect')" class="nav-link px-3 lg:px-4 py-2 rounded-lg text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all duration-200 flex items-center gap-2 font-medium hidden">
                        <i class="fas fa-bolt"></i> Connect
                    </button>
                    <button id="nav-resource-bank" onclick="showPage('resource-bank')" class="nav-link px-3 lg:px-4 py-2 rounded-lg text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all duration-200 flex items-center gap-2 font-medium hidden">
                        <i class="fas fa-database"></i> Resources
                    </button>
                    <button id="nav-confidence-corner" onclick="showPage('confidence-corner')" class="nav-link px-3 lg:px-4 py-2 rounded-lg text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all duration-200 flex items-center gap-2 font-medium hidden">
                        <i class="fas fa-heart"></i> Confidence
                    </button>
                    <button id="nav-chat" onclick="showPage('chat')" class="nav-link px-3 lg:px-4 py-2 rounded-lg text-gray-700 dark:text-gray-200 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all duration-200 flex items-center gap-2 font-medium hidden">
                        <i class="fas fa-comments"></i> Chat
                    </button>
                </div>

                <div class="flex items-center gap-3">
                    <button id="darkModeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-all duration-200 tooltip">
                        <i class="fas fa-moon text-gray-700 dark:text-yellow-400 text-xl"></i>
                        <span class="tooltip-text">Toggle Dark Mode</span>
                    </button>
                    <button id="nav-logout" onclick="handleLogout()" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2.5 rounded-full font-semibold shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-200 flex items-center gap-2 hidden">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Message Area -->
    <div id="message-area" class="container mx-auto mt-6 px-4 max-w-7xl fixed top-20 left-0 right-0 z-50 pointer-events-none">
        <div class="pointer-events-auto"></div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 md:px-8 py-8 max-w-7xl">
        <div id="chat-page" class="page-content active-page animate-fade-in">
            <div class="flex h-[calc(100vh-200px)] bg-white dark:bg-gray-800 rounded-2xl shadow-xl overflow-hidden">
                <!-- Left Panel: Conversations -->
                <div class="w-1/3 border-r border-gray-200 dark:border-gray-700 flex flex-col">
                    <div class="p-4 border-b border-gray-200 dark:border-gray-700">
                        <h3 class="text-lg font-bold text-gray-800 dark:text-gray-200">Conversations</h3>
                    </div>
                    <div id="conversations-list" class="flex-1 overflow-y-auto p-2">
                        <!-- Conversations will be loaded here -->
                    </div>
                </div>

                <!-- Right Panel: Chat Window -->
                <div class="flex-1 flex flex-col">
                    <div id="chat-header" class="p-4 border-b border-gray-200 dark:border-gray-700 hidden">
                        <h3 id="chat-with" class="text-lg font-bold text-gray-800 dark:text-gray-200">Select a connection to start chatting</h3>
                    </div>
                    <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4">
                        <p class="text-gray-500 text-center py-4">Select a connection to start chatting</p>
                    </div>
                    <div id="chat-input" class="p-4 border-t border-gray-200 dark:border-gray-700 hidden">
                        <div class="flex gap-2">
                            <input type="text" id="message-input" placeholder="Type your message..." class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700">
                            <button id="send-button" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-semibold">
                                <i class="fas fa-paper-plane"></i> Send
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/script/script.js"></script>
    <script src="/script/chat.js"></script>
</body>
</html>
